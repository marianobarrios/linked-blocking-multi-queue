name: Publish to Maven Central Repository
on:
  release:
    types: [published]
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: '21' # jReleaser not yet compatible with 25
          distribution: 'temurin'

      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF_NAME}" >>$GITHUB_ENV

      - name: Release
        run: ./gradlew publish jreleaserRelease
        env:
          VERSION: ${{ env.VERSION }}
          JRELEASER_GITHUB_TOKEN: x # just a non-empty one
          JRELEASER_GPG_PUBLIC_KEY: ${{ vars.JRELEASER_GPG_PUBLIC_KEY }}
          JRELEASER_GPG_SECRET_KEY: ${{ secrets.JRELEASER_GPG_SECRET_KEY }}
          JRELEASER_MAVENCENTRAL_SONATYPE_USERNAME: ${{ vars.JRELEASER_MAVENCENTRAL_SONATYPE_USERNAME }}
          JRELEASER_MAVENCENTRAL_SONATYPE_PASSWORD: ${{ secrets.JRELEASER_MAVENCENTRAL_SONATYPE_PASSWORD }}

      - name: Upload debug artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: reports-${{ strategy.job-index }}
          path: build/reports